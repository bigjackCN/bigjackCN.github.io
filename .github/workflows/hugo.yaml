# .github/workflows/hugo.yaml
# GitHub Actions workflow to build and deploy Hugo site to GitHub Pages

name: Deploy Hugo site to Pages

on:
  # Trigger the workflow on push to the main branch
  push:
    branches:
      - main
  # Allow manual trigger from Actions tab
  workflow_dispatch:

# Set permissions for deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skip runs queued between
concurrency:
  group: "pages"
  cancel-in-progress: false

# Use bash shell by default
defaults:
  run:
    shell: bash

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.146.0   # Specify your Hugo version here
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive   # Fetch theme submodules
          fetch-depth: 0          # Fetch all history for .GitInfo and .Lastmod
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true          # Enable extended version for Sass/SCSS support

      - name: Build static site
        run: hugo --minify        # Minify HTML, CSS, JS assets

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public          # Upload the generated public directory

  # Deploy job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build                 # Wait for build job to complete successfully
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4